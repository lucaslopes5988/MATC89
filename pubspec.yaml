name: atividade_flutter
description: Playce — hub de atividades físicas.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  auth:
    path: features/auth
  commons:
    path: commons
  core:
    path: core
  design_system:
    path: design_system
  events:
    path: features/events
  profile:
    path: features/profile
  firebase_core: ^3.13.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  get_it: ^8.0.3
  injectable: ^2.5.0

dev_dependencies:
  build_runner: ^2.4.15
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  injectable_generator: ^2.7.0

flutter:
  uses-material-design: true
